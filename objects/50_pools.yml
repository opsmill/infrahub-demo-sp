---
# First, the IPAM containers the prefix/address pools draw from.
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: IpamPrefix
  data:
    - prefix: 10.0.0.0/24
      description: PE Loopback0 supernet
      status: active
      role: loopback
    - prefix: 10.1.0.0/16
      description: Backbone p2p supernet
      status: active
      role: technical
    - prefix: 10.100.0.0/16
      description: PE-CE supernet
      status: active
      role: public

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: CoreNumberPool
  data:
    # vpn_id pools are scoped by intent band. The band on each
    # ServiceL3VpnIntent selects which pool the generator draws from;
    # pre-merge the pool-capacity check verifies the chosen band has
    # room. IDs 100–999 are reserved for bootstrap-seeded VPNs (one
    # per dataset overlay), so pool ranges start at 1000.
    - name: vpn_id_pool_financial
      node: ServiceL3Vpn
      node_attribute: vpn_id
      start_range: 1000
      end_range: 1999
    - name: vpn_id_pool_isp
      node: ServiceL3Vpn
      node_attribute: vpn_id
      start_range: 2000
      end_range: 2999
    - name: vpn_id_pool_internal
      node: ServiceL3Vpn
      node_attribute: vpn_id
      start_range: 3000
      end_range: 3999

    # service_id pools mirror the L3VPN layout: one per band, with
    # seeded SD-WANs reserved below 1000.
    - name: sdwan_id_pool_financial
      node: ServiceSdwan
      node_attribute: service_id
      start_range: 1000
      end_range: 1999
    - name: sdwan_id_pool_isp
      node: ServiceSdwan
      node_attribute: service_id
      start_range: 2000
      end_range: 2999
    - name: sdwan_id_pool_internal
      node: ServiceSdwan
      node_attribute: service_id
      start_range: 3000
      end_range: 3999

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: CoreIPAddressPool
  data:
    - name: pe_loopback_pool
      default_address_type: IpamIPAddress
      default_prefix_length: 32
      ip_namespace: default
      resources:
        - 10.0.0.0/24

---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: CoreIPPrefixPool
  data:
    - name: backbone_p2p_pool
      default_prefix_type: IpamPrefix
      default_prefix_length: 31
      default_member_type: address
      ip_namespace: default
      resources:
        - 10.1.0.0/16

    - name: pe_ce_pool
      default_prefix_type: IpamPrefix
      default_prefix_length: 30
      default_member_type: address
      ip_namespace: default
      resources:
        - 10.100.0.0/16
