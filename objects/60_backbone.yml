---
# 4 PE Devices
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: DcimDevice
  data:
    - name: pe-lon-arista
      status: active
      role: pe
      location: lon
      platform: arista_eos
      device_type: 7280R3
      asn: ["65000", "Sterling-Financial-AS"]
      member_of_groups:
        - pe_arista_eos
        - pes
    - name: pe-fra-cisco
      status: active
      role: pe
      location: fra
      platform: cisco_iosxr
      device_type: NCS-540
      asn: ["65000", "Sterling-Financial-AS"]
      member_of_groups:
        - pe_cisco_iosxr
        - pes
    - name: pe-ams-juniper
      status: active
      role: pe
      location: ams
      platform: juniper_junos
      device_type: MX204
      asn: ["65000", "Sterling-Financial-AS"]
      member_of_groups:
        - pe_juniper_junos
        - pes
    - name: pe-par-nokia
      status: active
      role: pe
      location: par
      platform: nokia_sros
      device_type: 7250-IXR-R6
      asn: ["65000", "Sterling-Financial-AS"]
      member_of_groups:
        - pe_nokia_sros
        - pes

---
# Loopback0 interfaces (one per PE) with embedded loopback IP addresses
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: InterfaceVirtual
  data:
    - name: Loopback0
      description: Router-ID / iBGP source
      mtu: 1500
      status: active
      role: management
      device: pe-lon-arista
      ip_addresses:
        kind: IpamIPAddress
        data:
          - address: 10.0.0.1/32
            description: pe-lon-arista loopback
    - name: Loopback0
      description: Router-ID / iBGP source
      mtu: 1500
      status: active
      role: management
      device: pe-fra-cisco
      ip_addresses:
        kind: IpamIPAddress
        data:
          - address: 10.0.0.2/32
            description: pe-fra-cisco loopback
    - name: Loopback0
      description: Router-ID / iBGP source
      mtu: 1500
      status: active
      role: management
      device: pe-ams-juniper
      ip_addresses:
        kind: IpamIPAddress
        data:
          - address: 10.0.0.3/32
            description: pe-ams-juniper loopback
    - name: Loopback0
      description: Router-ID / iBGP source
      mtu: 1500
      status: active
      role: management
      device: pe-par-nokia
      ip_addresses:
        kind: IpamIPAddress
        data:
          - address: 10.0.0.4/32
            description: pe-par-nokia loopback

---
# Backbone physical interfaces with embedded IP addresses (12 total for 6 p2p links)
# Naming: Ethernet1, Ethernet2, Ethernet3 on each PE (vendor-neutral for demo simplicity)
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: InterfacePhysical
  data:
    # pe-lon-arista
    - name: Ethernet1
      description: To pe-fra-cisco
      mtu: 9000
      status: active
      role: core
      device: pe-lon-arista
      ip_addresses:
        kind: IpamIPAddress
        data:
          - address: 10.1.0.0/31
    - name: Ethernet2
      description: To pe-ams-juniper
      mtu: 9000
      status: active
      role: core
      device: pe-lon-arista
      ip_addresses:
        kind: IpamIPAddress
        data:
          - address: 10.1.0.2/31
    - name: Ethernet3
      description: To pe-par-nokia
      mtu: 9000
      status: active
      role: core
      device: pe-lon-arista
      ip_addresses:
        kind: IpamIPAddress
        data:
          - address: 10.1.0.4/31
    # pe-fra-cisco
    - name: Ethernet1
      description: To pe-lon-arista
      mtu: 9000
      status: active
      role: core
      device: pe-fra-cisco
      ip_addresses:
        kind: IpamIPAddress
        data:
          - address: 10.1.0.1/31
    - name: Ethernet2
      description: To pe-ams-juniper
      mtu: 9000
      status: active
      role: core
      device: pe-fra-cisco
      ip_addresses:
        kind: IpamIPAddress
        data:
          - address: 10.1.0.6/31
    - name: Ethernet3
      description: To pe-par-nokia
      mtu: 9000
      status: active
      role: core
      device: pe-fra-cisco
      ip_addresses:
        kind: IpamIPAddress
        data:
          - address: 10.1.0.8/31
    # pe-ams-juniper
    - name: Ethernet1
      description: To pe-lon-arista
      mtu: 9000
      status: active
      role: core
      device: pe-ams-juniper
      ip_addresses:
        kind: IpamIPAddress
        data:
          - address: 10.1.0.3/31
    - name: Ethernet2
      description: To pe-fra-cisco
      mtu: 9000
      status: active
      role: core
      device: pe-ams-juniper
      ip_addresses:
        kind: IpamIPAddress
        data:
          - address: 10.1.0.7/31
    - name: Ethernet3
      description: To pe-par-nokia
      mtu: 9000
      status: active
      role: core
      device: pe-ams-juniper
      ip_addresses:
        kind: IpamIPAddress
        data:
          - address: 10.1.0.10/31
    # pe-par-nokia
    - name: Ethernet1
      description: To pe-lon-arista
      mtu: 9000
      status: active
      role: core
      device: pe-par-nokia
      ip_addresses:
        kind: IpamIPAddress
        data:
          - address: 10.1.0.5/31
    - name: Ethernet2
      description: To pe-fra-cisco
      mtu: 9000
      status: active
      role: core
      device: pe-par-nokia
      ip_addresses:
        kind: IpamIPAddress
        data:
          - address: 10.1.0.9/31
    - name: Ethernet3
      description: To pe-ams-juniper
      mtu: 9000
      status: active
      role: core
      device: pe-par-nokia
      ip_addresses:
        kind: IpamIPAddress
        data:
          - address: 10.1.0.11/31
    # Free customer-facing interfaces — allocated to L3VPN sites by the
    # generate_l3vpn generator (status=free is its allocation filter).
    - {name: Ethernet4, description: Customer-facing (free), mtu: 1500, status: free, role: cust, device: pe-lon-arista}
    - {name: Ethernet4, description: Customer-facing (free), mtu: 1500, status: free, role: cust, device: pe-fra-cisco}
    - {name: Ethernet4, description: Customer-facing (free), mtu: 1500, status: free, role: cust, device: pe-ams-juniper}
    - {name: Ethernet4, description: Customer-facing (free), mtu: 1500, status: free, role: cust, device: pe-par-nokia}

