---
# iBGP overlay sessions (6 pairs in full mesh, 12 RoutingBGPSession rows: one per direction)
# local_ip / remote_ip use bare HFID list: [address, namespace]
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: RoutingBGPSession
  data:
    # pe-lon-arista -> peers
    - description: lon-arista to fra-cisco
      session_type: INTERNAL
      role: backbone
      device: pe-lon-arista
      local_as: ["65000", "Sterling-Financial-AS"]
      remote_as: ["65000", "Sterling-Financial-AS"]
      local_ip: ["10.0.0.1/32", "default"]
      remote_ip: ["10.0.0.2/32", "default"]
