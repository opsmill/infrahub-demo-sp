---
# Customer-facing prefixes for the Kestrel Bank L3VPN.
# These represent the LAN behind each branch CE; the generator binds them
# to the VPN's VRF.
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: IpamPrefix
  data:
    - {prefix: 10.200.10.0/24, description: Kestrel Bank — London branch LAN, status: active, role: public}
    - {prefix: 10.200.20.0/24, description: Kestrel Bank — Frankfurt branch LAN, status: active, role: public}
    - {prefix: 10.200.30.0/24, description: Kestrel Bank — Amsterdam branch LAN, status: active, role: public}
    - {prefix: 10.200.40.0/24, description: Kestrel Bank — Paris branch LAN, status: active, role: public}

---
# ServiceL3VpnIntent + 4 branch sites (one per PE). Joining the
# l3vpn_intents generator-target group fires generate_l3vpn, which
# allocates the vpn_id from the isp pool, materialises VRF/RTs/PE-CE
# /30s, sets up PE-CE eBGP, and links the realised ServiceL3Vpn back.
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ServiceL3VpnIntent
  data:
    - name: kestrel-bank-mpls
      description: Kestrel Bank branch MPLS VPN — interconnects four European branches over the Lumina backbone.
      band: isp
      address_family: ipv4
      tenant:
        kind: OrganizationTenant
        data:
          name: kestrel-bank
      member_of_groups:
        - l3vpn_intents
      sites:
        kind: ServiceL3VpnIntentSite
        data:
          - name: london-branch
            pe_device: pe-lon-arista
            customer_subnet: ["10.200.10.0/24", "default"]
            routing_protocol: ebgp
            bgp_peer_asn: 65101
          - name: frankfurt-branch
            pe_device: pe-fra-cisco
            customer_subnet: ["10.200.20.0/24", "default"]
            routing_protocol: ebgp
            bgp_peer_asn: 65101
          - name: amsterdam-branch
            pe_device: pe-ams-juniper
            customer_subnet: ["10.200.30.0/24", "default"]
            routing_protocol: ebgp
            bgp_peer_asn: 65101
          - name: paris-branch
            pe_device: pe-par-nokia
            customer_subnet: ["10.200.40.0/24", "default"]
            routing_protocol: ebgp
            bgp_peer_asn: 65101
