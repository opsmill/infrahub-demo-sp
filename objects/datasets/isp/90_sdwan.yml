---
# Customer-facing prefixes for the Flo Streaming overlay.
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: IpamPrefix
  data:
    - {prefix: 10.250.10.0/24, description: Flo Streaming — London PoP LAN, status: active, role: public}
    - {prefix: 10.250.20.0/24, description: Flo Streaming — Frankfurt PoP LAN, status: active, role: public}
    - {prefix: 10.250.30.0/24, description: Flo Streaming — Paris PoP LAN, status: active, role: public}

---
# Default bootstrap SD-WAN intent (full-mesh, Viptela). Joining the
# sdwan_intents generator group fires generate_sdwan, which allocates a
# service_id from the isp pool, creates per-site edges, and links the
# realised ServiceSdwan back to this intent.
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: ServiceSdwanIntent
  data:
    - name: flo-streaming-overlay
      description: Flo Streaming any-to-any overlay across three European PoPs.
      band: isp
      vendor: viptela
      topology: full-mesh
      tenant:
        kind: OrganizationTenant
        data:
          name: flo-streaming
      member_of_groups:
        - sdwan_intents
      sites:
        kind: ServiceSdwanIntentSite
        data:
          - name: pop-london
            role: spoke
            location: lon
            lan_subnet: ["10.250.10.0/24", "default"]
          - name: pop-frankfurt
            role: spoke
            location: fra
            lan_subnet: ["10.250.20.0/24", "default"]
          - name: pop-paris
            role: spoke
            location: par
            lan_subnet: ["10.250.30.0/24", "default"]
