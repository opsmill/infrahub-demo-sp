---
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: CoreStandardGroup
  data:
    - name: pe_arista_eos
      description: PEs running Arista EOS.
    - name: pe_cisco_iosxr
      description: PEs running Cisco IOS-XR.
    - name: pe_juniper_junos
      description: PEs running Juniper Junos.
    - name: pe_nokia_sros
      description: PEs running Nokia SR OS.
    - name: pes
      description: All PE devices in the backbone.
    - name: topologies_mpls
      description: All MplsBackbone topology rows.
    # l3vpns group is populated dynamically when ServiceL3Vpn objects are created;
    # bootstrap creates it empty so transforms / generators can target it.
    - name: l3vpns
      description: All ServiceL3Vpn rows (auto-populated as services are created).
    # SD-WAN groups: auto-populated as ServiceSdwan and SD-WAN edge devices are created;
    # bootstrap creates them empty so transforms / generators can target them.
    - name: sdwans
      description: All ServiceSdwan rows (auto-populated as services are created).
    - name: sdwan_viptela_edges
      description: All Cisco Viptela SD-WAN edge devices (artifact target).
    - name: sdwan_versa_edges
      description: All Versa Networks SD-WAN edge devices (artifact target).

---
# Generator-target groups for the intent-driven service catalog.
# Every ServiceL3VpnIntent / ServiceSdwanIntent auto-enrols (via the
# Streamlit catalog or the examples/ fixtures) so the generator fires
# on intent create + on every change.
apiVersion: infrahub.app/v1
kind: Object
spec:
  kind: CoreGeneratorGroup
  data:
    - name: l3vpn_intents
      description: All ServiceL3VpnIntent rows (drives generate_l3vpn).
    - name: sdwan_intents
      description: All ServiceSdwanIntent rows (drives generate_sdwan).
