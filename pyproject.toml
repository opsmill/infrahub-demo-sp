[project]
name = "infrahub-demo-sp"
version = "0.1.0"
description = "Infrahub demo: multi-vendor MPLS backbone with L3VPN as a service"
readme = "README.md"
requires-python = ">=3.10,<3.13"
license = {text = "MIT"}
authors = [{name = "OpsMill"}]

dependencies = [
    "flask>=3.0.0",
    "infrahub-sdk[all]>=1.20.0,<2.0.0",
    "invoke>=2.2.0",
    "jinja2>=3.1.3",
    "mypy>=1.10.0",
    "netmiko>=4.3.0",
    "pandas>=2.0.0",
    "pybatfish>=2024.0",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.1.0",
    "pyyaml>=6.0",
    "requests>=2.31.0",
    "rich>=13.7.0",
    "ruff>=0.5.0",
    "streamlit>=1.30.0",
    "types-PyYAML>=6.0.0",
    "yamllint>=1.35.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["generators", "transforms", "checks"]

[tool.ruff]
line-length = 100
target-version = "py310"
# Auto-generated by `infrahubctl protocols`; lint/format would just re-flag
# every regeneration. Excluded from both ruff format and ruff check.
extend-exclude = ["generators/schema_protocols.py"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "ANN", "D"]
ignore = ["D203", "D213", "ANN401"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["D", "ANN"]
"scripts/*" = ["D"]

[tool.mypy]
python_version = "3.10"
strict = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = "tasks"
ignore_errors = true

# service_catalog pages run with Streamlit's CWD set to service_catalog/,
# so relative imports like `import utils` are correct at runtime but cannot
# be resolved by mypy from the repo root.
[[tool.mypy.overrides]]
module = "service_catalog.*"
ignore_errors = true

# scripts/ are one-off helper scripts, not production modules.
[[tool.mypy.overrides]]
module = "scripts.*"
ignore_errors = true

# Auto-generated by `infrahubctl protocols`; type errors here would just be
# re-introduced each regeneration. Same exclusion strategy as ruff.
[[tool.mypy.overrides]]
module = "generators.schema_protocols"
ignore_errors = true

[[tool.mypy.overrides]]
module = "smoke_create_l3vpn"
ignore_errors = true

[[tool.mypy.overrides]]
module = "push_arista"
ignore_errors = true

# tests/ use untyped fixtures and helpers — relax strict mode there.
[[tool.mypy.overrides]]
module = "tests.*"
ignore_errors = true

[[tool.mypy.overrides]]
module = "netmiko"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "streamlit"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "pandas"
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-vv --strict-markers"

[tool.rumdl.global]
# Historical plans/specs reference paths that don't resolve as filesystem
# links; treat them as reference material, not user-facing docs. The tests
# tree contains fixture markdown that isn't user-facing either.
exclude = [
    "docs/node_modules",
    "docs/superpowers",
    "tests",
]
respect-gitignore = true

[tool.coverage.run]
source = ["generators", "transforms", "checks", "service_catalog/utils", "batfish_runner"]
omit = ["tests/*", "scripts/*"]

[tool.coverage.report]
fail_under = 70
