---
# yaml-language-server: $schema=https://schema.infrahub.app/infrahub/schema/latest.json
version: "1.0"

nodes:
  - name: MplsBackbone
    namespace: Topology
    description: An MPLS service-provider backbone with PEs.
    label: MPLS Backbone
    icon: carbon:network-3
    # `CoreArtifactTarget` is required so the `clab-mpls-topology`
    # artifact definition can target this node — without it, Infrahub
    # silently no-ops on artifact-generate for topologies.
    inherit_from:
      - TopologyGeneric
      - CoreArtifactTarget
    include_in_menu: false
    human_friendly_id:
      - name__value
    display_label: name__value
    order_by:
      - name__value
    attributes:
      - name: name
        kind: Text
        unique: true
        order_weight: 1000
      - name: isis_area
        kind: Text
        default_value: "49.0001"
        order_weight: 1300
      - name: isis_level
        kind: Dropdown
        default_value: "level-2"
        order_weight: 1400
        choices:
          - name: level-1
            label: Level-1
          - name: level-2
            label: Level-2
          - name: level-1-2
            label: Level-1-2
    relationships:
      - name: asn
        peer: RoutingAutonomousSystem
        cardinality: one
        optional: false
        kind: Attribute
        order_weight: 1500
      - name: pes
        peer: DcimDevice
        cardinality: many
        optional: true
        kind: Attribute
        order_weight: 1600
