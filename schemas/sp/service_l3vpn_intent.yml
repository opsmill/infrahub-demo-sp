---
# yaml-language-server: $schema=https://schema.infrahub.app/infrahub/schema/latest.json
version: "1.0"

# Intent layer for L3VPN provisioning.
#
# A ServiceL3VpnIntent carries the user-facing request (which sites,
# which tenant, which routing protocol). The generator turns the intent
# into a realised ServiceL3Vpn + ServiceL3VpnSite graph, allocates a
# vpn_id from the band-scoped pool, and drives status:
#   draft -> in-delivery -> active   (success)
#                        -> failed   (with failure_message)
#
# Once an intent is `active`, the immutability check blocks edits to
# any tracked field on a branch — users must create a new intent
# rather than mutate a live one.

nodes:
  - name: L3VpnIntent
    namespace: Service
    description: A user-facing request to provision an L3VPN service.
    label: L3VPN Intent
    icon: mdi:vpn-outline
    include_in_menu: false
    human_friendly_id:
      - name__value
    display_label: name__value
    order_by:
      - name__value
    attributes:
      - name: name
        kind: Text
        unique: true
        order_weight: 1000
      - name: description
        kind: Text
        optional: true
        order_weight: 1100
      - name: band
        kind: Dropdown
        order_weight: 1200
        description: "Selects which vpn_id pool the generator draws from."
        choices:
          - name: financial
            label: Financial
            color: "#A9CCE3"
          - name: isp
            label: ISP
            color: "#CDEACC"
          - name: internal
            label: Internal
            color: "#FFF2CC"
      - name: address_family
        kind: Dropdown
        default_value: "ipv4"
        order_weight: 1300
        choices:
          - name: ipv4
            label: IPv4
          - name: ipv4_ipv6
            label: IPv4 + IPv6
      - name: status
        kind: Dropdown
        default_value: "draft"
        order_weight: 1400
        description: "Lifecycle state driven by the generator. Branch-aware."
        choices:
          - name: draft
            label: Draft
            color: "#FFF2CC"
          - name: in_delivery
            label: In Delivery
            color: "#F5CBA7"
          - name: active
            label: Active
            color: "#A9DFBF"
          - name: failed
            label: Failed
            color: "#F1948A"
      - name: failure_message
        kind: Text
        optional: true
        order_weight: 1500
        description: "Human-readable error written by the generator on hard failure."
    relationships:
      - name: tenant
        peer: OrganizationGeneric
        cardinality: one
        optional: false
        kind: Attribute
        order_weight: 1600
      - name: sites
        identifier: l3vpn_intent__site
        peer: ServiceL3VpnIntentSite
        cardinality: many
        optional: true
        kind: Component
        order_weight: 1700
      - name: realised_service
        identifier: l3vpn_intent__realised
        peer: ServiceL3Vpn
        cardinality: one
        optional: true
        kind: Attribute
        order_weight: 1800
        description: "Set by the generator when the intent reaches `active`."

  - name: L3VpnIntentSite
    namespace: Service
    description: One PE attachment requested by an L3VPN intent.
    label: L3VPN Intent Site
    icon: mdi:office-building-marker-outline
    include_in_menu: false
    menu_placement: ServiceL3VpnIntent
    human_friendly_id:
      - name__value
    display_label: name__value
    order_by:
      - name__value
    uniqueness_constraints:
      - [intent, name__value]
    attributes:
      - name: name
        kind: Text
        order_weight: 1000
      - name: routing_protocol
        kind: Dropdown
        order_weight: 1300
        choices:
          - name: ebgp
            label: eBGP
            color: "#A9CCE3"
          - name: static
            label: Static
            color: "#FFF2CC"
          - name: connected
            label: Connected
            color: "#CDEACC"
      - name: bgp_peer_asn
        kind: Number
        optional: true
        order_weight: 1400
      - name: static_routes
        kind: JSON
        optional: true
        order_weight: 1500
    relationships:
      - name: intent
        identifier: l3vpn_intent__site
        peer: ServiceL3VpnIntent
        cardinality: one
        optional: false
        kind: Parent
        order_weight: 1050
      - name: pe_device
        peer: DcimDevice
        cardinality: one
        optional: false
        kind: Attribute
        order_weight: 1100
      - name: customer_subnet
        peer: IpamPrefix
        cardinality: one
        optional: false
        kind: Attribute
        order_weight: 1600
