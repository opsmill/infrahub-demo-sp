---
# yaml-language-server: $schema=https://schema.infrahub.app/infrahub/schema/latest.json
version: "1.0"

nodes:
  - name: L3Vpn
    namespace: Service
    description: A Layer-3 VPN service offered to a tenant.
    label: L3 VPN
    icon: mdi:vpn
    human_friendly_id:
      - name__value
    display_label: name__value
    order_by:
      - name__value
    attributes:
      - name: name
        kind: Text
        unique: true
        order_weight: 1000
      - name: description
        kind: Text
        optional: true
        order_weight: 1100
      - name: vpn_id
        kind: Number
        unique: true
        order_weight: 1200
        description: "Allocated from vpn_id_pool. Used to derive RD/RT."
      - name: address_family
        kind: Dropdown
        default_value: "ipv4"
        order_weight: 1300
        choices:
          - name: ipv4
            label: IPv4
          - name: ipv4_ipv6
            label: IPv4 + IPv6
      - name: status
        kind: Dropdown
        default_value: "draft"
        order_weight: 1400
        choices:
          - name: draft
            label: Draft
            color: "#FFF2CC"
          - name: active
            label: Active
            color: "#A9DFBF"
          - name: decommissioned
            label: Decommissioned
            color: "#D3D3D3"
    relationships:
      - name: tenant
        peer: OrganizationGeneric
        cardinality: one
        optional: false
        kind: Attribute
        order_weight: 1500
      - name: vrf
        peer: IpamVRF
        cardinality: one
        optional: true
        kind: Attribute
        order_weight: 1600
      - name: sites
        peer: ServiceL3VpnSite
        cardinality: many
        optional: true
        kind: Component
        order_weight: 1700

  - name: L3VpnSite
    namespace: Service
    description: A single PE attachment of an L3VPN to a customer subnet.
    label: L3VPN Site
    icon: mdi:office-building-marker
    menu_placement: ServiceL3Vpn
    human_friendly_id:
      - name__value
    display_label: name__value
    order_by:
      - name__value
    uniqueness_constraints:
      - [l3vpn, name__value]
    attributes:
      - name: name
        kind: Text
        order_weight: 1000
      - name: routing_protocol
        kind: Dropdown
        order_weight: 1300
        choices:
          - name: ebgp
            label: eBGP
            color: "#A9CCE3"
          - name: static
            label: Static
            color: "#FFF2CC"
          - name: connected
            label: Connected
            color: "#CDEACC"
      - name: bgp_peer_asn
        kind: Number
        optional: true
        order_weight: 1400
      - name: static_routes
        kind: JSON
        optional: true
        order_weight: 1500
      - name: status
        kind: Dropdown
        default_value: "provisioning"
        order_weight: 1200
        choices:
          - name: provisioning
            label: Provisioning
            color: "#FFF2CC"
          - name: active
            label: Active
            color: "#A9DFBF"
          - name: decommissioned
            label: Decommissioned
            color: "#D3D3D3"
    relationships:
      - name: l3vpn
        peer: ServiceL3Vpn
        cardinality: one
        optional: false
        kind: Parent
        order_weight: 1050
      - name: pe
        peer: DcimDevice
        cardinality: one
        optional: false
        kind: Attribute
        order_weight: 1100
      - name: pe_interface
        peer: InterfacePhysical
        cardinality: one
        optional: true
        kind: Attribute
        order_weight: 1150
      - name: customer_subnet
        peer: IpamPrefix
        cardinality: one
        optional: false
        kind: Attribute
        order_weight: 1600
      - name: pe_address
        identifier: l3vpnsite__pe_address
        peer: IpamIPAddress
        cardinality: one
        optional: true
        kind: Attribute
        order_weight: 1700
      - name: ce_address
        identifier: l3vpnsite__ce_address
        peer: IpamIPAddress
        cardinality: one
        optional: true
        kind: Attribute
        order_weight: 1800
