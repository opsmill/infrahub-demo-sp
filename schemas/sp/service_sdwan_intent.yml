---
# yaml-language-server: $schema=https://schema.infrahub.app/infrahub/schema/latest.json
version: "1.0"

# Intent layer for SD-WAN provisioning. See service_l3vpn_intent.yml
# for the full pattern — same state machine, same band semantics.

nodes:
  - name: SdwanIntent
    namespace: Service
    description: A user-facing request to provision an SD-WAN service.
    label: SD-WAN Intent
    icon: mdi:lan-pending
    include_in_menu: false
    human_friendly_id:
      - name__value
    display_label: name__value
    order_by:
      - name__value
    attributes:
      - name: name
        kind: Text
        unique: true
        order_weight: 1000
      - name: description
        kind: Text
        optional: true
        order_weight: 1100
      - name: band
        kind: Dropdown
        order_weight: 1200
        description: "Selects which service_id pool the generator draws from."
        choices:
          - name: financial
            label: Financial
            color: "#A9CCE3"
          - name: isp
            label: ISP
            color: "#CDEACC"
          - name: internal
            label: Internal
            color: "#FFF2CC"
      - name: vendor
        kind: Dropdown
        default_value: "viptela"
        order_weight: 1300
        choices:
          - name: viptela
            label: Cisco Viptela
            color: "#1ba0d7"
          - name: versa
            label: Versa Networks
            color: "#ff7f50"
      - name: topology
        kind: Dropdown
        default_value: "full-mesh"
        order_weight: 1400
        choices:
          - name: full-mesh
            label: Full Mesh
          - name: hub-spoke
            label: Hub and Spoke
      - name: status
        kind: Dropdown
        default_value: "draft"
        order_weight: 1500
        description: "Lifecycle state driven by the generator. Branch-aware."
        choices:
          - name: draft
            label: Draft
            color: "#FFF2CC"
          - name: in_delivery
            label: In Delivery
            color: "#F5CBA7"
          - name: active
            label: Active
            color: "#A9DFBF"
          - name: failed
            label: Failed
            color: "#F1948A"
      - name: failure_message
        kind: Text
        optional: true
        order_weight: 1600
        description: "Human-readable error written by the generator on hard failure."
    relationships:
      - name: tenant
        peer: OrganizationGeneric
        cardinality: one
        optional: false
        kind: Attribute
        order_weight: 1700
      - name: sites
        identifier: sdwan_intent__site
        peer: ServiceSdwanIntentSite
        cardinality: many
        optional: true
        kind: Component
        order_weight: 1800
      - name: realised_service
        identifier: sdwan_intent__realised
        peer: ServiceSdwan
        cardinality: one
        optional: true
        kind: Attribute
        order_weight: 1900
        description: "Set by the generator when the intent reaches `active`."

  - name: SdwanIntentSite
    namespace: Service
    description: One site requested by an SD-WAN intent.
    label: SD-WAN Intent Site
    icon: mdi:office-building-marker-outline
    include_in_menu: false
    menu_placement: ServiceSdwanIntent
    human_friendly_id:
      - name__value
    display_label: name__value
    order_by:
      - name__value
    uniqueness_constraints:
      - [intent, name__value]
    attributes:
      - name: name
        kind: Text
        order_weight: 1000
      - name: role
        kind: Dropdown
        default_value: "spoke"
        order_weight: 1100
        choices:
          - name: hub
            label: Hub
            color: "#A9CCE3"
          - name: spoke
            label: Spoke
            color: "#CDEACC"
          - name: branch
            label: Branch
            color: "#D2B4DE"
    relationships:
      - name: intent
        identifier: sdwan_intent__site
        peer: ServiceSdwanIntent
        cardinality: one
        optional: false
        kind: Parent
        order_weight: 1050
      - name: location
        peer: LocationSite
        cardinality: one
        optional: false
        kind: Attribute
        order_weight: 1300
      - name: lan_subnet
        peer: IpamPrefix
        cardinality: one
        optional: false
        kind: Attribute
        order_weight: 1400
