---
# yaml-language-server: $schema=https://schema.infrahub.app/infrahub/schema/latest.json
version: "1.0"

nodes:
  - name: Sdwan
    namespace: Service
    description: An SD-WAN service offered to a tenant.
    label: SD-WAN
    icon: mdi:lan-connect
    include_in_menu: false
    human_friendly_id:
      - name__value
    display_label: name__value
    order_by:
      - name__value
    attributes:
      - name: name
        kind: Text
        unique: true
        order_weight: 1000
      - name: description
        kind: Text
        optional: true
        order_weight: 1100
      - name: service_id
        kind: Number
        unique: true
        order_weight: 1200
        description: "Allocated from sdwan_id_pool. Used for SD-WAN site-id derivation."
      - name: vendor
        kind: Dropdown
        default_value: "viptela"
        order_weight: 1300
        choices:
          - name: viptela
            label: Cisco Viptela
            color: "#1ba0d7"
          - name: versa
            label: Versa Networks
            color: "#ff7f50"
      - name: topology
        kind: Dropdown
        default_value: "full-mesh"
        order_weight: 1400
        choices:
          - name: full-mesh
            label: Full Mesh
          - name: hub-spoke
            label: Hub and Spoke
      - name: status
        kind: Dropdown
        default_value: "draft"
        order_weight: 1500
        choices:
          - name: draft
            label: Draft
            color: "#FFF2CC"
          - name: active
            label: Active
            color: "#A9DFBF"
          - name: decommissioned
            label: Decommissioned
            color: "#D3D3D3"
    relationships:
      - name: tenant
        peer: OrganizationGeneric
        cardinality: one
        optional: false
        kind: Attribute
        order_weight: 1600
      - name: sites
        identifier: sdwan__site
        peer: ServiceSdwanSite
        cardinality: many
        optional: true
        kind: Component
        order_weight: 1700

  - name: SdwanSite
    namespace: Service
    description: A single SD-WAN site (one customer location with one edge device).
    label: SD-WAN Site
    icon: mdi:office-building-marker
    include_in_menu: false
    menu_placement: ServiceSdwan
    human_friendly_id:
      - name__value
    display_label: name__value
    order_by:
      - name__value
    uniqueness_constraints:
      - [sdwan, name__value]
    attributes:
      - name: name
        kind: Text
        order_weight: 1000
      - name: role
        kind: Dropdown
        default_value: "spoke"
        order_weight: 1100
        choices:
          - name: hub
            label: Hub
            color: "#A9CCE3"
          - name: spoke
            label: Spoke
            color: "#CDEACC"
          - name: branch
            label: Branch
            color: "#D2B4DE"
      - name: status
        kind: Dropdown
        default_value: "provisioning"
        order_weight: 1200
        choices:
          - name: provisioning
            label: Provisioning
            color: "#FFF2CC"
          - name: active
            label: Active
            color: "#A9DFBF"
          - name: decommissioned
            label: Decommissioned
            color: "#D3D3D3"
    relationships:
      - name: sdwan
        identifier: sdwan__site
        peer: ServiceSdwan
        cardinality: one
        optional: false
        kind: Parent
        order_weight: 1050
      - name: location
        peer: LocationSite
        cardinality: one
        optional: false
        kind: Attribute
        order_weight: 1300
      - name: lan_subnet
        peer: IpamPrefix
        cardinality: one
        optional: false
        kind: Attribute
        order_weight: 1400
      - name: lan_address
        peer: IpamIPAddress
        cardinality: one
        optional: true
        kind: Attribute
        order_weight: 1500
      - name: sdwan_edge
        peer: DcimDevice
        cardinality: one
        optional: true
        kind: Attribute
        order_weight: 1600
