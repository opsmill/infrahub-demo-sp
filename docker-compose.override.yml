---
services:
  database:
    environment:
      - NEO4J_dbms_memory_transaction_total_max=8g
      - NEO4J_dbms_memory_heap_initial__size=2g
      - NEO4J_dbms_memory_heap_max__size=4g
      - NEO4J_dbms_memory_pagecache_size=2g

  infrahub-server:
    ports:
      - "${INFRAHUB_PORT:-8000}:8000"

  task-manager:
    ports:
      - "${PREFECT_PORT:-4200}:4200"

  task-worker:
    volumes:
      - ./:/upstream

  streamlit-service-catalog:
    build:
      context: ./service_catalog
      dockerfile: Dockerfile
    container_name: service-catalog
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    environment:
      - INFRAHUB_ADDRESS=http://infrahub-server:8000
      - INFRAHUB_UI_URL=${INFRAHUB_UI_URL:-http://localhost:8000}
      - INFRAHUB_API_TOKEN=${INFRAHUB_API_TOKEN:-06438eb2-8019-4776-878c-0941b1f1d1ec}
      - DEFAULT_BRANCH=main
      - GENERATOR_WAIT_TIME=60
      # Batfish Check page targets — defaults match the sidecar service
      # below; override here if the topology changes.
      - BATFISH_HOST=batfish
      - BATFISH_PORT=9996
    volumes:
      - ./service_catalog:/app
      - ./objects:/objects:ro
      # The Batfish Check page (pages/3_Batfish_Check.py) imports
      # `checks.batfish_helpers` to reuse the query parsers without
      # duplicating them. Mounted read-only — the page is a reader,
      # the canonical check sources live with the rest of `checks/`.
      - ./checks:/app/checks:ro
    depends_on:
      - infrahub-server
    profiles:
      - service-catalog
    networks:
      - default

  batfish:
    image: batfish/allinone:latest
    # batfish/allinone is published for linux/amd64 only (no arm64 variant),
    # so pin the platform explicitly. On Apple Silicon Docker runs it under
    # emulation; this silences the "platform does not match" warning and makes
    # the intent explicit (works the same on native amd64 hosts).
    platform: linux/amd64
    container_name: batfish
    restart: unless-stopped
    networks:
      - default
