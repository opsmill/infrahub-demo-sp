---
# Schemas, queries, transforms, generators, checks, and artifacts
# are registered here. This file grows as phases progress.

schemas:
  - schemas/base/
  - schemas/extensions/
  - schemas/sp/

menus:
  - menus/menu.yml

queries:
  - {name: l3vpn, file_path: queries/service/l3vpn.gql}
  - {name: l3vpn_intent, file_path: queries/service/l3vpn_intent.gql}
  - {name: pe, file_path: queries/config/pe.gql}
  - {name: clab_topology, file_path: queries/topology/clab.gql}
  - {name: l3vpn_overlap, file_path: queries/validation/l3vpn_overlap.gql}
  - {name: l3vpn_site_subnet, file_path: queries/validation/l3vpn_site_subnet.gql}
  - {name: pe_interface_alloc, file_path: queries/validation/pe_interface_alloc.gql}
  - {name: backbone_session_count, file_path: queries/validation/backbone_session_count.gql}
  - {name: sdwan, file_path: queries/service/sdwan.gql}
  - {name: sdwan_intent, file_path: queries/service/sdwan_intent.gql}
  - {name: sdwan_edge, file_path: queries/config/sdwan_edge.gql}
  - {name: sdwan_id_overlap, file_path: queries/validation/sdwan_id_overlap.gql}
  - {name: sdwan_site_subnet, file_path: queries/validation/sdwan_site_subnet.gql}
  - {name: intent_immutability, file_path: queries/validation/intent_immutability.gql}
  - {name: intent_pool_capacity, file_path: queries/validation/intent_pool_capacity.gql}
python_transforms:
  - {name: pe_arista_eos, class_name: PeAristaEos, file_path: transforms/pe_arista_eos.py}
  - {name: pe_cisco_iosxr, class_name: PeCiscoIosXr, file_path: transforms/pe_cisco_iosxr.py}
  - {name: pe_juniper_junos, class_name: PeJuniperJunos, file_path: transforms/pe_juniper_junos.py}
  - {name: pe_nokia_sros, class_name: PeNokiaSrOs, file_path: transforms/pe_nokia_sros.py}
  - {name: pe_nokia_srlinux, class_name: PeNokiaSrLinux, file_path: transforms/pe_nokia_srlinux.py}
  - {name: clab_topology, class_name: ClabTopology, file_path: transforms/clab_topology.py}
  - {name: sdwan_viptela, class_name: SdwanViptela, file_path: transforms/sdwan_viptela.py}
  - {name: sdwan_versa, class_name: SdwanVersa, file_path: transforms/sdwan_versa.py}
jinja2_transforms: []
artifact_definitions:
  - name: pe-arista-eos-config
    artifact_name: pe-arista-eos
    content_type: text/plain
    targets: pe_arista_eos
    transformation: pe_arista_eos
    parameters: {device: name__value}
  - name: pe-cisco-iosxr-config
    artifact_name: pe-cisco-iosxr
    content_type: text/plain
    targets: pe_cisco_iosxr
    transformation: pe_cisco_iosxr
    parameters: {device: name__value}
  - name: pe-juniper-junos-config
    artifact_name: pe-juniper-junos
    content_type: text/plain
    targets: pe_juniper_junos
    transformation: pe_juniper_junos
    parameters: {device: name__value}
  - name: pe-nokia-sros-config
    artifact_name: pe-nokia-sros
    content_type: text/plain
    targets: pe_nokia_sros
    transformation: pe_nokia_sros
    parameters: {device: name__value}
  - name: pe-nokia-srlinux-config
    artifact_name: pe-nokia-srlinux
    content_type: text/plain
    targets: pe_nokia_sros
    transformation: pe_nokia_srlinux
    parameters: {device: name__value}
  - name: clab-mpls-topology
    artifact_name: clab-mpls-topology
    content_type: text/plain
    targets: topologies_mpls
    transformation: clab_topology
    parameters: {name: name__value}
  - name: sdwan-viptela-config
    artifact_name: sdwan-viptela
    content_type: text/plain
    targets: sdwan_viptela_edges
    transformation: sdwan_viptela
    parameters: {device: name__value}
  - name: sdwan-versa-config
    artifact_name: sdwan-versa
    content_type: text/plain
    targets: sdwan_versa_edges
    transformation: sdwan_versa
    parameters: {device: name__value}
generator_definitions:
  # Both generators run on every proposed-change preview AND once more
  # on merge — so the realised graph is reviewable in the PC diff and
  # is re-materialised cleanly on main. (Defaults are already True for
  # both flags; they're listed explicitly to make the intent obvious.)
  - name: generate_l3vpn
    file_path: generators/generate_l3vpn.py
    targets: l3vpn_intents
    query: l3vpn_intent
    class_name: L3VpnGenerator
    execute_in_proposed_change: true
    execute_after_merge: true
    parameters:
      name: name__value
  - name: generate_sdwan
    file_path: generators/generate_sdwan.py
    targets: sdwan_intents
    query: sdwan_intent
    class_name: SdwanGenerator
    execute_in_proposed_change: true
    execute_after_merge: true
    parameters:
      name: name__value
check_definitions:
  - {name: l3vpn_overlap, class_name: L3VpnOverlapCheck, file_path: checks/l3vpn_overlap.py, targets: l3vpns}
  - {name: l3vpn_site_subnet, class_name: L3VpnSiteSubnetCheck, file_path: checks/l3vpn_site_subnet.py, targets: l3vpns}
  - {name: pe_interface_alloc, class_name: PeInterfaceAllocCheck, file_path: checks/pe_interface_alloc.py, targets: pes}
  - {name: backbone_session_count, class_name: BackboneSessionCountCheck, file_path: checks/backbone_session_count.py, targets: pes}
  - {name: sdwan_id_overlap, class_name: SdwanIdOverlapCheck, file_path: checks/sdwan_id_overlap.py, targets: sdwans}
  - {name: sdwan_site_subnet, class_name: SdwanSiteSubnetCheck, file_path: checks/sdwan_site_subnet.py, targets: sdwans}
  # Global intent guards — no `targets:`, run on every proposed change.
  - {name: intent_immutability, class_name: IntentImmutabilityCheck, file_path: checks/intent_immutability.py}
  - {name: intent_pool_capacity, class_name: IntentPoolCapacityCheck, file_path: checks/intent_pool_capacity.py}
